services:
  - type: web
    name: ai-scrum-master
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: COMPOSIO_USER_ID
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.10
