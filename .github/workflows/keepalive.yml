name: Keep Render Service Alive

on:
  schedule:
    # Every 10 minutes. Render's free tier sleeps after 15 min of inactivity,
    # so pinging every 10 keeps the service warm with margin.
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        run: |
          curl -sSf https://launch-pixel-scrumbot.onrender.com/health \
            || curl -sSf https://launch-pixel-scrumbot.onrender.com/ping \
            || curl -sSf https://launch-pixel-scrumbot.onrender.com \
            || echo "Ping failed, but workflow continues."
